context:
  expressions:
    log_meal:
      # Basic meal logging with food items
      - "@optionals I @optionals ate $food:food @optionals for $meal:meal @optionals"
      - "@optionals I @optionals had $food:food @optionals for $meal:meal @optionals"
      - "@optionals I @optionals consumed $food:food @optionals for $meal:meal @optionals"
      - "@optionals for $meal:meal @optionals I @optionals ate $food:food @optionals"
      - "@optionals for $meal:meal @optionals I @optionals had $food:food @optionals"
      - "@optionals I'm eating $food:food @optionals"
      - "@optionals I'm having $food:food @optionals"
      - "@optionals I ate a $food:food @optionals"
      - "@optionals I ate an $food:food @optionals"
      - "@optionals I had a $food:food @optionals"
      - "@optionals I had an $food:food @optionals"
      - "@optionals I ate some $food:food @optionals"
      - "@optionals I had some $food:food @optionals"
      
      # Meal logging with carb amounts
      - "@optionals I @optionals ate $food:food with $pv.TwoDigitInteger:carbs carbs @optionals for $meal:meal @optionals"
      - "@optionals I @optionals had $food:food with $pv.TwoDigitInteger:carbs carbs @optionals for $meal:meal @optionals"
      - "@optionals I @optionals ate $pv.TwoDigitInteger:carbs carbs @optionals for $meal:meal @optionals"
      - "@optionals I @optionals had $pv.TwoDigitInteger:carbs carbs @optionals for $meal:meal @optionals"
      - "@optionals for $meal:meal @optionals I @optionals ate $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals for $meal:meal @optionals I @optionals had $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals I ate $food:food $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals I had $food:food $pv.TwoDigitInteger:carbs carbs @optionals"
      
      # Meal logging with just carbs
      - "@optionals I @optionals ate $pv.TwoDigitInteger:carbs @optionals grams of @optionals carbs @optionals"
      - "@optionals I @optionals had $pv.TwoDigitInteger:carbs @optionals grams of @optionals carbs @optionals"
      - "@optionals I @optionals consumed $pv.TwoDigitInteger:carbs @optionals grams of @optionals carbs @optionals"
      - "@optionals log @optionals $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals record @optionals $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals add @optionals $pv.TwoDigitInteger:carbs carbs @optionals"
      - "@optionals log $pv.TwoDigitInteger:carbs carbs for $meal:meal @optionals"
      - "@optionals add $pv.TwoDigitInteger:carbs carbs to $meal:meal @optionals"
      
      # Three-digit carb support
      
      # Simple meal commands
      - "log a meal"
      - "record a meal"
      - "add a meal"
      - "log my $meal:meal"
      - "record my $meal:meal"
      - "track my $meal:meal"
      - "log $food:food"
      - "add $food:food"
      - "I ate $food:food"
      - "I had $food:food"

    log_insulin:
      # Direct number + units commands (most common pattern)
      - "log $pv.TwoDigitInteger:units units of insulin"
      - "log $pv.TwoDigitInteger:units units"
      - "log $number:number units of insulin"
      - "log $number:number units"
      - "record $pv.TwoDigitInteger:units units of insulin"
      - "record $pv.TwoDigitInteger:units units"
      - "add $pv.TwoDigitInteger:units units of insulin"
      - "add $pv.TwoDigitInteger:units units"
      
      # Basic insulin logging with units
      - "@optionals I @optionals took $pv.TwoDigitInteger:units units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals I @optionals injected $pv.TwoDigitInteger:units units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals I @optionals gave @optionals myself @optionals $pv.TwoDigitInteger:units units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals I @optionals bolused $pv.TwoDigitInteger:units units @optionals of @optionals $insulin_type:insulin_type @optionals"
      
      # Insulin logging without type
      - "@optionals I @optionals took $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals I @optionals injected $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals I @optionals gave @optionals myself @optionals $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals I @optionals bolused $pv.TwoDigitInteger:units units @optionals"
      
      # Simple insulin commands with optionals
      - "@optionals log @optionals $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals record @optionals $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals add @optionals $pv.TwoDigitInteger:units units @optionals of insulin @optionals"
      - "@optionals log insulin @optionals $pv.TwoDigitInteger:units @optionals units @optionals"
      - "@optionals record insulin @optionals $pv.TwoDigitInteger:units @optionals units @optionals"
      
      # Natural number expressions
      - "@optionals I @optionals took $number:number units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals I @optionals injected $number:number units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals I @optionals gave @optionals myself @optionals $number:number units @optionals of @optionals $insulin_type:insulin_type @optionals"
      - "@optionals bolus $number:number units @optionals"
      - "@optionals inject $number:number units @optionals"
      - "give $number:number units"
      - "take $number:number units"
      
      # Three-digit number support
      
      # Simple commands
      - "log insulin"
      - "record insulin"
      - "add insulin"
      - "track insulin"

    show_log:
      # Show entries by type and time
      - "show @optionals my @optionals $log_type:log_type @optionals from @optionals $date_ref:date_ref"
      - "what @optionals did I eat @optionals for $meal:meal @optionals $date_ref:date_ref @optionals"
      - "show @optionals me @optionals $date_ref:date_ref $meal:meal"
      - "what was my $log_type:log_type $date_ref:date_ref"
      - "show $date_ref:date_ref entries"
      - "display @optionals my @optionals log"
      - "open @optionals my @optionals logbook"
      - "show log"
      - "view entries"

    delete_entry:
      # Delete insulin timers
      - "delete @optionals the @optionals $ordinal:ordinal @optionals insulin @optionals timer"
      - "remove @optionals the @optionals $ordinal:ordinal @optionals insulin @optionals timer"
      - "cancel @optionals the @optionals $ordinal:ordinal @optionals insulin @optionals timer"
      - "stop @optionals the @optionals $ordinal:ordinal @optionals insulin @optionals timer"
      - "kill @optionals the @optionals $ordinal:ordinal @optionals insulin @optionals timer"
      
      # Delete all timers
      - "delete @optionals all @optionals insulin timers"
      - "remove @optionals all @optionals insulin timers"
      - "cancel @optionals all @optionals insulin timers"
      - "stop @optionals all @optionals insulin timers"
      - "clear @optionals all @optionals timers"
      
      # Delete entries
      - "delete @optionals the @optionals last @optionals $log_type:log_type @optionals entry"
      - "remove @optionals the @optionals last @optionals $log_type:log_type @optionals entry"
      - "delete @optionals my @optionals last @optionals $meal:meal"
      - "remove @optionals my @optionals last @optionals $meal:meal"
      - "delete last entry"
      - "remove last entry"

    update_entry:
      # Update meal carbs
      - "update @optionals my @optionals $meal:meal to $pv.TwoDigitInteger:carbs carbs"
      - "change @optionals my @optionals $meal:meal to $pv.TwoDigitInteger:carbs carbs"
      - "correct @optionals my @optionals $meal:meal to $pv.TwoDigitInteger:carbs carbs"
      - "fix @optionals my @optionals $meal:meal to $pv.TwoDigitInteger:carbs carbs"
      
      # Update insulin units
      - "update @optionals my @optionals last insulin to $pv.TwoDigitInteger:units units"
      - "change @optionals my @optionals last insulin to $pv.TwoDigitInteger:units units"
      - "correct @optionals my @optionals last insulin to $pv.TwoDigitInteger:units units"
      - "fix @optionals my @optionals last insulin to $pv.TwoDigitInteger:units units"
      
      # Update with natural numbers
      - "update @optionals my @optionals $meal:meal to $number:number carbs"
      - "change @optionals my @optionals last insulin to $number:number units"

